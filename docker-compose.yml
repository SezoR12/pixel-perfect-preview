version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: tureep_postgres
    environment:
      POSTGRES_USER: tureep
      POSTGRES_PASSWORD: tureep_dev
      POSTGRES_DB: tureep_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tureep -d tureep_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tureep_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: tureep_backend
    environment:
      DATABASE_URL: postgresql+psycopg2://tureep:tureep_dev@postgres:5432/tureep_db
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: tureep-dev-secret-change-in-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: tureep_frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - backend
    command: bun run dev --host 0.0.0.0 --port 3000

volumes:
  postgres_data:
