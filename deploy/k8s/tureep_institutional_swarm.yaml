apiVersion: v1
kind: Namespace
metadata:
  name: tureep-ai-prod
  labels:
    environment: production
    sovereignty: sovereign-mena-mesh
    app.kubernetes.io/name: tureep-ai-plus
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tureep-app-config
  namespace: tureep-ai-prod
data:
  APP_ENV: "production"
  DEBUG: "false"
  LOG_LEVEL: "INFO"
  ALLOWED_ORIGINS: "https://tureep.ai,https://api.tureep.ai,https://app.tureep.ai"
  REDIS_HOST: "redis.tureep-ai-prod.svc.cluster.local"
  REDIS_PORT: "6379"
  DATABASE_POOL_SIZE: "20"
  DATABASE_MAX_OVERFLOW: "10"
---
apiVersion: v1
kind: Secret
metadata:
  name: tureep-app-secrets
  namespace: tureep-ai-prod
type: Opaque
stringData:
  # Supabase Transaction Pooler URL (with pgbouncer=true)
  DATABASE_URL: "postgresql://postgres.nfzowljlswwbfdzitkrc:Tureep*Db#Sovereign2026@aws-0-eu-central-1.pooler.supabase.com:6543/postgres?pgbouncer=true"
  SECRET_KEY: "Tureep*Institutional#Core!MasterKey2026xKey"
  STRIPE_SECRET_KEY: "stripe_live_secret_key_placeholder"
  STRIPE_WEBHOOK_SECRET: "whsec_live_InstitutionalStripeWebhookSecret"
  SUMSUB_SECRET_KEY: "sumsub_live_InstitutionalSecretKey"
  SUMSUB_APP_TOKEN: "sumsub_token_InstitutionalAppToken"
  SWIFT_GATEWAY_API_KEY: "swift_key_InstitutionalSwiftGatewayKey"
---
# --------------------------------------------------------- #
# 1. AUTHENTICATION & IDENTITY SOVEREIGNTY MICROSERVICE     #
# --------------------------------------------------------- #
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tureep-auth-service
  namespace: tureep-ai-prod
  labels:
    app: tureep-auth
spec:
  replicas: 3
  selector:
    matchLabels:
      app: tureep-auth
  template:
    metadata:
      labels:
        app: tureep-auth
    spec:
      containers:
      - name: fastapi-worker
        image: 012345678901.dkr.ecr.eu-central-1.amazonaws.com/tureep/auth-service:v2.0.0
        imagePullPolicy: IfNotPresent
        command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8001", "--workers", "4"]
        envFrom:
        - configMapRef:
            name: tureep-app-config
        - secretRef:
            name: tureep-app-secrets
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "2048Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: tureep-auth-service
  namespace: tureep-ai-prod
spec:
  ports:
  - port: 8001
    targetPort: 8001
  selector:
    app: tureep-auth
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: tureep-auth-hpa
  namespace: tureep-ai-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: tureep-auth-service
  minReplicas: 3
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 75
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: tureep-auth-pdb
  namespace: tureep-ai-prod
spec:
  minAvailable: "80%"
  selector:
    matchLabels:
      app: tureep-auth

---
