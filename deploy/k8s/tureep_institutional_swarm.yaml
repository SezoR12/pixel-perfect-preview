# --------------------------------------------------------- #
# 8. TRAEFIK / NGINX EDGE API GATEWAY INGRESS ROUTING TABLE #
# --------------------------------------------------------- #
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tureep-edge-gateway-ingress
  namespace: tureep-ai-prod
  annotations:
    kubernetes.io/ingress.class: "traefik"
    cert-manager.io/cluster-issuer: "letsencrypt-production"
    traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
    traefik.ingress.kubernetes.io/router.middlewares: "tureep-ai-prod-security-headers@kubecrd"
    nginx.ingress.kubernetes.io/proxy-body-size: "5m"
    nginx.ingress.kubernetes.io/limit-rps: "100"
spec:
  tls:
  - hosts:
    - api.tureep.ai
    secretName: tureep-api-tls-cert
  rules:
  - host: api.tureep.ai
    http:
      paths:
      # Service 1 paths (Auth & Identity)
      - path: /api/v1/auth
        pathType: Prefix
        backend:
          service:
            name: tureep-auth-service
            port:
              number: 8001
      - path: /api/v1/users
        pathType: Prefix
        backend:
          service:
            name: tureep-auth-service
            port:
              number: 8001

      # Service 2 paths (Core Spot Trading)
      - path: /api/v1/products
        pathType: Prefix
        backend:
          service:
            name: tureep-core-trade-service
            port:
              number: 8002
      - path: /api/v1/demands
        pathType: Prefix
        backend:
          service:
            name: tureep-core-trade-service
            port:
              number: 8002
      - path: /api/v1/deals
        pathType: Prefix
        backend:
          service:
            name: tureep-core-trade-service
            port:
              number: 8002

      # Service 3 paths (Escrow & Trade Finance)
      - path: /api/v1/orders
        pathType: Prefix
        backend:
          service:
            name: tureep-escrow-finance-service
            port:
              number: 8003
      - path: /api/v1/billing
        pathType: Prefix
        backend:
          service:
            name: tureep-escrow-finance-service
            port:
              number: 8003
      - path: /api/v1/trade-finance
        pathType: Prefix
        backend:
          service:
            name: tureep-escrow-finance-service
            port:
              number: 8003

      # Service 4 paths (Logistics & Telemetry)
      - path: /api/v1/logistics
        pathType: Prefix
        backend:
          service:
            name: tureep-logistics-edi-service
            port:
              number: 8004

      # Service 5 paths (Compliance & Sanctions)
      - path: /api/v1/kyc
        pathType: Prefix
        backend:
          service:
            name: tureep-compliance-kyc-service
            port:
              number: 8005
      - path: /api/v1/compliance
        pathType: Prefix
        backend:
          service:
            name: tureep-compliance-kyc-service
            port:
              number: 8005

      # Service 6 paths (Heuristic Intelligence Engine)
      - path: /api/v1/ml-analytics
        pathType: Prefix
        backend:
          service:
            name: tureep-ml-intelligence-service
            port:
              number: 8006

      # Service 7 paths (Notification Bureau)
      - path: /api/v1/notifications
        pathType: Prefix
        backend:
          service:
            name: tureep-notification-bureau-service
            port:
              number: 8007
